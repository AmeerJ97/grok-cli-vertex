name: Feature request
description: Propose a focused improvement or provider capability.
title: "[feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow is blocked or painful today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should change?
    validations:
      required: true
  - type: dropdown
    id: provider-impact
    attributes:
      label: Provider impact
      options:
        - Vertex only
        - Native xAI fallback only
        - Both providers
        - Provider-independent
        - Not sure
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Verification idea
      description: How should maintainers test or demo this?
      placeholder: CLI command, targeted test, manual smoke flow, or documentation update.
  - type: checkboxes
    id: guardrails
    attributes:
      label: Guardrails
      options:
        - label: This does not present the fork as an official xAI or Google product.
          required: true
        - label: This should respect provider capability gates where applicable.
          required: true
